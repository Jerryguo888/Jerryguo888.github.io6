<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Borders</title>
    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            padding: 30px;
        }


        .box {
            font-size: 32px;
            font-weight: bold;
            padding: 10px 20px;
            margin-bottom: 25px;
            width: 450px; 
        }

        .box-double {
            background-color: lightblue;
            border: 8px double tomato; 
        }


        .box-rounded {
            background-color: yellow;
            border: 4px solid dodgerblue;
            border-radius: 15px; 
        }
        .box-dotted {
            background-color: mediumseagreen;
            border: 12px dotted gray;
        }
    </style>
</head>
<body>

    <div class="box box-double">Hello World</div>
    <div class="box box-rounded">Hello World</div>
    <div class="box box-dotted">Hello World</div>

</body>
</html>
